<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Territory Map</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:black;
  overflow:hidden;
  font-family:"Times New Roman", serif;
  color:white;
}

/* ── TOP-RIGHT HUD: wraps stats widget + menu widget side by side ── */
#top-right-hud{
  position:fixed;
  top:14px;
  right:14px;
  z-index:9999;
  display:flex;
  align-items:flex-start;
  gap:8px;
}

/* ── STATS WIDGET ── */
#stats-widget{
  background:#121212;
  border:1.5px solid rgba(220,220,220,0.5);
  border-radius:14px;
  box-shadow:0 0 20px rgba(192,192,192,0.2);
  padding:5px 9px;
  display:flex;
  flex-direction:column;
  gap:5px;
  min-width:64px;
  align-self:flex-start;
  margin-top:2px;
}

.stats-row{
  display:flex;
  align-items:center;
  gap:7px;
}

.stats-icon{
  width:22px;
  height:22px;
  border-radius:50%;
  object-fit:cover;
  border:1px solid rgba(192,192,192,0.3);
  flex-shrink:0;
  display:block;
}

.stats-count{
  font-family:"Times New Roman",serif;
  font-size:13px;
  font-weight:700;
  color:#e8e8e8;
  letter-spacing:0.5px;
  white-space:nowrap;
}

.stats-count.unc{
  color:#888;
}

.stats-divider{
  height:1px;
  background:rgba(192,192,192,0.12);
}

/* ── MENU WIDGET (top-right) ── */
#menu-widget{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
}

/* Pill wrapper — just the circle+label row, always visible */
#menu-pill-wrap{
  position:relative;
  z-index:2;
}

/* Outer card — wraps pill + dropdown as one seamless block when open */
#menu-card{
  background:transparent;
  border:1.5px solid transparent;
  border-radius:32px;
  box-shadow:none;
  overflow:visible;
  transition:border-color 0.2s, box-shadow 0.2s, border-radius 0.2s, background 0.2s;
  display:inline-flex;
  flex-direction:column;
  align-items:stretch;
}
#menu-card:hover{
  background:#121212;
  border-radius:32px;
  border-color:rgba(220,220,220,0.7);
  box-shadow:0 0 20px rgba(192,192,192,0.3);
}
#menu-card.open{
  background:#121212;
  border-radius:18px;
  border-color:rgba(220,220,220,0.7);
  box-shadow:0 0 20px rgba(192,192,192,0.3);
}

/* The pill: logo circle + "Menu" text side by side */
#menu-pill{
  display:flex;
  align-items:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  user-select:none;
  padding-right:0;
  overflow:hidden;
  white-space:nowrap;
}

/* Circle logo — 68px (slightly larger than stats widget) */
#menu-logo{
  width:68px;
  height:68px;
  border-radius:50%;
  object-fit:cover;
  display:block;
  flex-shrink:0;
  margin:2px 0 2px 2px;
  border:1.5px solid rgba(192,192,192,0.55);
  box-shadow:0 0 10px rgba(192,192,192,0.25);
  transition:box-shadow 0.2s;
}
#menu-card:hover #menu-logo,
#menu-card.open #menu-logo{
  border-color:transparent;
  box-shadow:none;
}

/* "Menu" label — hidden by default, slides in on hover/open */
#menu-label{
  font-family:"Times New Roman",serif;
  font-size:15px;
  font-weight:700;
  letter-spacing:0.8px;
  color:#e8e8e8;
  white-space:nowrap;
  max-width:0;
  overflow:hidden;
  opacity:0;
  padding-left:0;
  transition:max-width 0.25s ease, opacity 0.2s ease, padding-left 0.25s ease;
}
#menu-card:hover #menu-label,
#menu-card.open #menu-label{
  max-width:120px;
  opacity:1;
  padding-left:10px;
}

/* Chevron indicator */
#menu-chevron{
  font-size:10px;
  color:rgba(192,192,192,0.5);
  margin-left:0;
  margin-right:0;
  max-width:0;
  overflow:hidden;
  opacity:0;
  transition:max-width 0.25s ease, opacity 0.2s ease, margin 0.25s ease, transform 0.2s;
  line-height:1;
}
#menu-card:hover #menu-chevron,
#menu-card.open #menu-chevron{
  max-width:20px;
  opacity:1;
  margin-left:6px;
  margin-right:6px;
}
#menu-card.open #menu-chevron{ transform:rotate(180deg); }

/* Thin divider between pill and dropdown items */
#menu-divider-line{
  height:1px;
  background:rgba(192,192,192,0.15);
  display:none;
}
#menu-card.open #menu-divider-line{ display:block; }

/* Dropdown — flows inside the card, no absolute positioning */
#menu-dropdown{
  display:none;
  flex-direction:column;
  width:100%;
  padding-bottom:6px;
}
#menu-dropdown.open{ display:flex; }

.menu-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 16px;
  font-size:14px;
  font-family:"Times New Roman",serif;
  color:#ccc;
  text-decoration:none;
  cursor:pointer;
  border:none;
  background:none;
  width:100%;
  text-align:left;
  transition:background 0.15s, color 0.15s;
  letter-spacing:0.4px;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.menu-item:hover{ background:rgba(255,255,255,0.06); color:#fff; }
.menu-item .menu-icon{ font-size:15px; opacity:0.7; }
.menu-separator{ height:1px; background:rgba(255,255,255,0.07); }

#toggle-nodes-btn{
  box-sizing:border-box;
  appearance:none;
  -webkit-appearance:none;
}

/* ── UI SHELL: only used on mobile ── */
#ui-shell{
  display:contents;
}

/* MAP */
#map-container{
  position:fixed;
  top:0; left:0;
  width:100vw;
  height:100vh;
  overflow:hidden;
  cursor:grab;
  user-select:none;
  -webkit-user-select:none;
  touch-action:none;
}
#map-container.grabbing{cursor:grabbing;}

#map-wrapper{
  position:absolute;
  top:0;
  left:0;
  transform-origin:0 0;
}

#bg-logo{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:50%;
  opacity:0.05;
  pointer-events:none;
}

#map-wrapper img.map{
  width:100%;
  display:block;
  pointer-events:none;
}

#territory-svg{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

/* TERRITORY */
.territory-group{cursor:pointer;}

.territory-poly{
  stroke:silver;
  stroke-width:0.1;
  transition:0.2s;
}

.territory-poly-outline{
  stroke:rgba(0,0,0,0.85);
  stroke-width:0.25;
  fill:none;
  pointer-events:none;
  transition:0.2s;
}

.territory-group:hover .territory-poly{
  fill:rgba(255,182,193,0.4) !important;
}

#territory-svg.borders-only .territory-group:hover .territory-poly{
  fill:none !important;
}

.number-box{
  fill:#2a2a2a;
  stroke:silver;
  stroke-width:0.08;
}

.territory-label{
  fill:white;
  font-size:1.3px;
  text-anchor:middle;
  dominant-baseline:middle;
  font-weight:bold;
  pointer-events:none;
}

.node-bubble{transition:opacity 0.2s;}
.territory-group:hover .node-bubble{opacity:0;}

.node-label{
  fill:white;
  font-size:0.7px;
  text-anchor:middle;
  dominant-baseline:middle;
  font-weight:bold;
  pointer-events:none;
  transition:opacity 0.2s;
}
.territory-group:hover .node-label{opacity:0;}

.territory-icon{
  pointer-events:none;
  opacity:0;
  transition:opacity 0.2s;
}
.territory-group:hover .territory-icon,
.territory-group:active .territory-icon{opacity:1;}

/* ── MODAL ── */
#modal-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:99999;
}
#modal-overlay.open{display:flex;}

@keyframes slideUp{
  from{opacity:0;transform:translateY(24px) scale(0.97);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

.modal{
  position:relative;
  width:560px;
  max-width:92vw;
  max-height:88vh;
  overflow-y:auto;
  background:#121212;
  border-radius:4px;
  box-shadow:0 20px 60px rgba(0,0,0,0.85), 0 0 0 1px rgba(255,255,255,0.06);
  animation:slideUp 0.25s ease;
  font-family:"Times New Roman",serif;
}

.modal-accent-bar{
  height:4px;
  width:100%;
  background:var(--faction-color, #555);
  box-shadow:0 0 18px var(--faction-color, #555);
}

.modal::after{
  content:"";
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.07) 3px,
    rgba(0,0,0,0.07) 4px
  );
  pointer-events:none;
  z-index:0;
}

.modal-inner{
  position:relative;
  z-index:1;
  padding:22px 26px 26px;
}

.modal-header{
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:18px;
}

.modal-icon-wrap{
  flex-shrink:0;
  width:72px;
  height:72px;
  border-radius:6px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:8px;
}

.modal-faction-icon{
  width:100%;
  height:100%;
  object-fit:contain;
}

.modal-header-text{flex:1;min-width:0;}

.modal-header-text h2{
  font-size:17px;
  font-weight:700;
  letter-spacing:0.6px;
  color:#f0f0f0;
  margin:0 0 4px 0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.modal-subtitle{
  font-size:11px;
  color:#555;
  letter-spacing:1.5px;
  text-transform:uppercase;
}

.modal-divider{
  height:1px;
  background:linear-gradient(to right, var(--faction-color,#444), transparent);
  margin-bottom:16px;
  opacity:0.5;
}

.modal-stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:16px;
}

.modal-stat{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:3px;
  padding:8px 12px;
}

.modal-stat .stat-label{
  font-size:10px;
  color:#555;
  text-transform:uppercase;
  letter-spacing:1.2px;
  margin-bottom:4px;
}

.modal-stat .stat-value{
  font-size:14px;
  font-weight:700;
  color:#ddd;
  letter-spacing:0.3px;
}

.modal-status-badge{
  display:inline-flex;
  align-items:center;
  gap:5px;
  font-size:12px;
  font-weight:700;
  letter-spacing:0.5px;
}

.modal-status-badge::before{
  content:"";
  display:inline-block;
  width:7px;
  height:7px;
  border-radius:50%;
  background:currentColor;
  box-shadow:0 0 6px currentColor;
}

.badge-contested{ color:#ff6060; }
.badge-controlled{ color:#50e87a; }
.badge-neutral{ color:#7878ff; }

.modal-desc-wrap{
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(255,255,255,0.06);
  border-left:2px solid var(--faction-color,#444);
  border-radius:0 3px 3px 0;
  padding:10px 14px;
}

.modal-desc{
  font-size:13px;
  color:#999;
  line-height:1.75;
  font-style:italic;
}

.modal-close{
  position:absolute;
  top:12px;
  right:14px;
  font-size:20px;
  cursor:pointer;
  color:#444;
  transition:color 0.2s;
  z-index:2;
  line-height:1;
  padding:4px 8px;
}
.modal-close:hover{ color:#bbb; }

/* ── LEADERBOARD MODAL ── */
#leaderboard-overlay{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:99999;
}
#leaderboard-overlay.open{ display:flex; }

#leaderboard-box{
  position:relative;
  width:420px;
  max-width:92vw;
  max-height:85vh;
  overflow-y:auto;
  background:#121212;
  border-radius:4px;
  box-shadow:0 20px 60px rgba(0,0,0,0.85), 0 0 0 1px rgba(255,255,255,0.06);
  animation:slideUp 0.25s ease;
  font-family:"Times New Roman",serif;
}

#leaderboard-box::after{
  content:"";
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,transparent 3px,
    rgba(0,0,0,0.07) 3px,rgba(0,0,0,0.07) 4px
  );
  pointer-events:none;
  z-index:0;
}

#leaderboard-inner{
  position:relative;
  z-index:1;
  padding:22px 24px 26px;
}

#leaderboard-title{
  font-size:16px;
  font-weight:700;
  letter-spacing:1.2px;
  color:#f0f0f0;
  text-transform:uppercase;
  margin-bottom:4px;
}

#leaderboard-sub{
  font-size:10px;
  color:#555;
  letter-spacing:1.5px;
  text-transform:uppercase;
  margin-bottom:16px;
}

.lb-divider{
  height:1px;
  background:rgba(192,192,192,0.1);
  margin-bottom:14px;
}

.lb-row{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px 10px;
  border-radius:4px;
  margin-bottom:6px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
}

.lb-rank{
  font-size:12px;
  font-weight:700;
  color:#555;
  letter-spacing:0.5px;
  min-width:22px;
  text-align:center;
}

.lb-icons{
  display:flex;
  align-items:center;
  gap:3px;
  flex-shrink:0;
}

.lb-icon{
  width:26px;
  height:26px;
  border-radius:50%;
  object-fit:cover;
  border:1px solid rgba(192,192,192,0.25);
  display:block;
}

.lb-names{
  flex:1;
  min-width:0;
}

.lb-name{
  font-size:12px;
  color:#ccc;
  letter-spacing:0.3px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.lb-count{
  font-size:13px;
  font-weight:700;
  color:#e8e8e8;
  letter-spacing:0.5px;
  flex-shrink:0;
}

.lb-row.rank-1{
  border-color:rgba(255,215,0,0.25);
  background:rgba(255,215,0,0.05);
}
.lb-row.rank-1 .lb-rank{ color:#ffd700; }
.lb-row.rank-1 .lb-count{ color:#ffd700; }

#leaderboard-close{
  position:absolute;
  top:12px; right:14px;
  font-size:20px;
  cursor:pointer;
  color:#444;
  transition:color 0.2s;
  z-index:2;
  line-height:1;
  padding:4px 8px;
}
#leaderboard-close:hover{ color:#bbb; }

@media (max-width:600px){
  #leaderboard-box{
    width:100%; max-width:100%; max-height:80vh;
    border-radius:16px 16px 0 0;
  }
  #leaderboard-inner{ padding:20px 16px 28px; }
  #leaderboard-overlay{ align-items:flex-end; }
}
@media (max-width:600px){
  #top-right-hud{ top:10px; right:10px; gap:6px; }
  #menu-logo{ width:54px; height:54px; }
  #stats-widget{ padding:4px 8px; min-width:56px; }
  .stats-icon{ width:19px; height:19px; }
  .stats-count{ font-size:12px; }

  #menu-card.open #menu-label{
    font-size:14px; max-width:120px; opacity:1; padding-left:10px;
  }
  #menu-card.open #menu-chevron{
    max-width:20px; opacity:1; margin-left:6px; margin-right:10px;
  }

  .menu-item{ padding:14px 18px; font-size:15px; }
  .menu-item .menu-icon{ font-size:17px; }

  #modal-overlay{ align-items:flex-end; }
  .modal{
    width:100%;
    max-width:100%;
    max-height:80vh;
    border-radius:16px 16px 0 0;
  }
  .modal-inner{ padding:20px 16px 28px; }
  .modal-icon-wrap{ width:56px; height:56px; padding:6px; }
  .modal-header-text h2{ font-size:16px; }
  .modal-subtitle{ font-size:10px; }
  .modal-stats{ grid-template-columns:1fr 1fr; gap:6px; }
  .modal-stat{ padding:8px 10px; }
  .modal-stat .stat-label{ font-size:9px; }
  .modal-stat .stat-value{ font-size:13px; }
  .modal-desc{ font-size:13px; line-height:1.65; }
  .modal-close{ font-size:26px; top:10px; right:12px; padding:6px 10px; }
}
</style>
</head>

<body>

<!-- Top-right HUD: stats widget + menu widget side by side -->
<div id="top-right-hud">

  <!-- Stats widget: leading faction (top) + uncontrolled count (bottom) -->
  <div id="stats-widget">
    <div class="stats-row" id="stats-top-row"></div>
    <div class="stats-divider"></div>
    <div class="stats-row">
      <img class="stats-icon" src="unc.png" alt="uncontrolled">
      <span class="stats-count unc" id="stats-unc-count">#0</span>
    </div>
  </div>

  <!-- Menu widget: pill + dropdown inside one seamless card -->
  <div id="menu-widget">
    <div id="menu-card">
      <div id="menu-pill">
        <img id="menu-logo" src="button.png" alt="Menu">
        <span id="menu-label">Menu</span>
        <span id="menu-chevron">▼</span>
      </div>
      <div id="menu-divider-line"></div>
      <div id="menu-dropdown">
        <a class="menu-item" href="https://docs.google.com/document/d/1uo7Kn0eOoMWLEY8FDHopDWbpXySb-J01I7ewMGmW6XQ/edit?tab=t.0" target="_blank">
          <span class="menu-icon">📋</span> Warfare Rules
        </a>
        <div class="menu-separator"></div>
        <button class="menu-item" id="leaderboard-btn">
          <span class="menu-icon">🏆</span> Leaderboard
        </button>
        <div class="menu-separator"></div>
        <button class="menu-item" id="toggle-nodes-btn">
          <span class="menu-icon">🗺️</span> Borders Only
        </button>
      </div>
    </div>
  </div>

</div>

<!-- Map container -->
<div id="map-container">
  <div id="map-wrapper">
    <img src="map.png" class="map" id="map-img">
    <svg id="territory-svg" viewBox="0 0 100 50"></svg>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay">
  <div class="modal" id="modal-box">
    <div class="modal-accent-bar" id="modal-accent-bar"></div>
    <div class="modal-inner">
      <div class="modal-close" id="modal-close">×</div>
      <div class="modal-header">
        <div class="modal-icon-wrap">
          <img class="modal-faction-icon" id="modal-icon" src="" alt="faction icon">
        </div>
        <div class="modal-header-text">
          <h2 id="modal-title"></h2>
          <div class="modal-subtitle" id="modal-subtitle"></div>
        </div>
      </div>
      <div class="modal-divider" id="modal-divider"></div>
      <div class="modal-stats">
        <div class="modal-stat">
          <div class="stat-label">Controller</div>
          <div class="stat-value" id="modal-controller"></div>
        </div>
        <div class="modal-stat">
          <div class="stat-label">Status</div>
          <div class="stat-value" id="modal-status"></div>
        </div>
        <div class="modal-stat">
          <div class="stat-label">Territory Size</div>
          <div class="stat-value" id="modal-size"></div>
        </div>
        <div class="modal-stat">
          <div class="stat-label">Strategic Value</div>
          <div class="stat-value" id="modal-value"></div>
        </div>
      </div>
      <div class="modal-desc-wrap" id="modal-desc-wrap">
        <div class="modal-desc" id="modal-desc"></div>
      </div>
    </div>
  </div>
</div>

<!-- Leaderboard modal -->
<div id="leaderboard-overlay">
  <div id="leaderboard-box">
    <div id="leaderboard-inner">
      <div id="leaderboard-close">×</div>
      <div id="leaderboard-title">Leaderboard</div>
      <div id="leaderboard-sub">Territory Control Rankings</div>
      <div class="lb-divider"></div>
      <div id="leaderboard-rows"></div>
    </div>
  </div>
</div>

<script>
let scale, minScale;
let originX, originY;

const container = document.getElementById("map-container");
const wrapper   = document.getElementById("map-wrapper");
const mapImg    = document.getElementById("map-img");
const overlay   = document.getElementById("modal-overlay");

function hexToRGBA(hex, alpha){
  const r=parseInt(hex.substring(1,3),16);
  const g=parseInt(hex.substring(3,5),16);
  const b=parseInt(hex.substring(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function isMobile(){ return window.innerWidth <= 768; }

function init(){
  const cW = container.clientWidth;
  const cH = container.clientHeight;
  const mW = mapImg.naturalWidth;
  const mH = mapImg.naturalHeight;
  if(!mW || !mH) return;

  wrapper.style.width  = mW + "px";
  wrapper.style.height = mH + "px";

  const scaleW = cW / mW;
  const scaleH = cH / mH;
  const fitBoth = Math.min(scaleW, scaleH);

  if(isMobile()){
    minScale = scaleW;
  } else {
    minScale = fitBoth;
  }

  scale = minScale;
  originX = (cW - mW * scale) / 2;
  originY = (cH - mH * scale) / 2;
  apply();
}

if(mapImg.complete && mapImg.naturalWidth > 0){
  init();
} else {
  mapImg.onload = init;
}
window.addEventListener("resize", init);

function apply(){
  wrapper.style.transform = `translate(${originX}px,${originY}px) scale(${scale})`;
}

function clamp(){
  const cW = container.clientWidth;
  const cH = container.clientHeight;
  const mW = mapImg.naturalWidth;
  const mH = mapImg.naturalHeight;
  const sw = mW * scale;
  const sh = mH * scale;

  if(sw <= cW){ originX = (cW - sw) / 2; }
  else { originX = Math.min(0, Math.max(cW - sw, originX)); }

  if(sh <= cH){ originY = (cH - sh) / 2; }
  else { originY = Math.min(0, Math.max(cH - sh, originY)); }
}

/* WHEEL ZOOM */
container.addEventListener("wheel", e => {
  e.preventDefault();
  const rect   = wrapper.getBoundingClientRect();
  const mouseX = e.clientX - rect.left;
  const mouseY = e.clientY - rect.top;
  const zoom   = e.deltaY < 0 ? 1.1 : 0.9;
  let newScale = Math.max(minScale, scale * zoom);
  const ratio  = newScale / scale;
  originX = e.clientX - mouseX * ratio;
  originY = e.clientY - mouseY * ratio;
  scale   = newScale;
  clamp();
  apply();
}, {passive:false});

/* MOUSE PAN */
let dragging=false, lastX=0, lastY=0;
let dragStartX=0, dragStartY=0, didPan=false;
const PAN_THRESHOLD = 4;

container.addEventListener("mousedown", e => {
  dragging=true; didPan=false;
  lastX=dragStartX=e.clientX;
  lastY=dragStartY=e.clientY;
  container.classList.add("grabbing");
});
window.addEventListener("mouseup", () => {
  dragging=false;
  container.classList.remove("grabbing");
});
window.addEventListener("mousemove", e => {
  if(!dragging) return;
  originX += e.clientX - lastX;
  originY += e.clientY - lastY;
  lastX=e.clientX; lastY=e.clientY;
  if(Math.abs(e.clientX-dragStartX)>PAN_THRESHOLD || Math.abs(e.clientY-dragStartY)>PAN_THRESHOLD) didPan=true;
  clamp(); apply();
});

/* TOUCH */
let tapStartX=0, tapStartY=0, wasTap=false;
let lastTouchDist=0;
const TAP_THRESHOLD = 10;

container.addEventListener("touchstart", e => {
  e.preventDefault();
  if(e.touches.length === 1){
    dragging=true; wasTap=true;
    lastX=tapStartX=e.touches[0].clientX;
    lastY=tapStartY=e.touches[0].clientY;
  } else if(e.touches.length === 2){
    dragging=false; wasTap=false;
    lastTouchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
},{passive:false});

container.addEventListener("touchmove", e => {
  e.preventDefault();
  if(e.touches.length === 1 && dragging){
    const dx = e.touches[0].clientX - lastX;
    const dy = e.touches[0].clientY - lastY;
    originX += dx; originY += dy;
    lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
    if(Math.abs(e.touches[0].clientX-tapStartX)>TAP_THRESHOLD ||
       Math.abs(e.touches[0].clientY-tapStartY)>TAP_THRESHOLD) wasTap=false;
    clamp(); apply();
  } else if(e.touches.length === 2){
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    if(!lastTouchDist){ lastTouchDist=dist; return; }
    const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const rect = wrapper.getBoundingClientRect();
    const mX   = midX - rect.left;
    const mY   = midY - rect.top;
    let newScale = Math.max(minScale, scale * (dist / lastTouchDist));
    const ratio  = newScale / scale;
    originX = midX - mX * ratio;
    originY = midY - mY * ratio;
    scale   = newScale;
    lastTouchDist = dist;
    clamp(); apply();
  }
},{passive:false});

container.addEventListener("touchend", e => {
  if(e.touches.length === 0){
    dragging=false; lastTouchDist=0;
    setTimeout(() => { wasTap=false; }, 100);
  }
},{passive:true});

/* ── FACTION DATA: shared computation ── */
function computeFactionData(){
  const UNC = "Uncontrolled";
  const counts = {};
  let uncCount = 0;

  territories.forEach(t => {
    if(t.controller === UNC){
      uncCount++;
    } else {
      if(!counts[t.controller]) counts[t.controller] = { count:0, icon:t.icon, name:t.controller };
      counts[t.controller].count++;
    }
  });

  // Build sorted tiers: group factions with equal counts together
  const sorted = Object.values(counts).sort((a,b) => b.count - a.count);
  const tiers = [];
  sorted.forEach(faction => {
    const last = tiers[tiers.length - 1];
    if(last && last[0].count === faction.count){
      last.push(faction);
    } else {
      tiers.push([faction]);
    }
  });

  return { tiers, uncCount };
}

/* ── STATS WIDGET: render top row with tie support ── */
(function renderStats(){
  const { tiers, uncCount } = computeFactionData();

  const topRow = document.getElementById("stats-top-row");
  document.getElementById("stats-unc-count").textContent = "#" + uncCount;

  if(!tiers.length){
    topRow.style.display = "none";
    return;
  }

  const topTier = tiers[0];

  // Clear existing content in top row and rebuild
  topRow.innerHTML = "";

  // Icons group (side by side for ties)
  const iconsWrap = document.createElement("div");
  iconsWrap.style.cssText = "display:flex;align-items:center;gap:3px;flex-shrink:0;";
  topTier.forEach(f => {
    const img = document.createElement("img");
    img.className = "stats-icon";
    img.src = f.icon;
    img.alt = f.name;
    iconsWrap.appendChild(img);
  });

  const countSpan = document.createElement("span");
  countSpan.className = "stats-count";
  countSpan.textContent = "#" + topTier[0].count;

  topRow.appendChild(iconsWrap);
  topRow.appendChild(countSpan);
})();

/* ── LEADERBOARD: build rows ── */
function buildLeaderboard(){
  const { tiers } = computeFactionData();
  const container = document.getElementById("leaderboard-rows");
  container.innerHTML = "";

  if(!tiers.length){
    container.innerHTML = '<div style="color:#555;font-size:13px;text-align:center;padding:16px;">No controlled territories yet.</div>';
    return;
  }

  tiers.forEach((tier, idx) => {
    const rank = idx + 1;
    const row = document.createElement("div");
    row.className = "lb-row" + (rank === 1 ? " rank-1" : "");

    const rankEl = document.createElement("div");
    rankEl.className = "lb-rank";
    rankEl.textContent = "#" + rank;

    const iconsEl = document.createElement("div");
    iconsEl.className = "lb-icons";
    tier.forEach(f => {
      const img = document.createElement("img");
      img.className = "lb-icon";
      img.src = f.icon;
      img.alt = f.name;
      iconsEl.appendChild(img);
    });

    const namesEl = document.createElement("div");
    namesEl.className = "lb-names";
    namesEl.innerHTML = tier.map(f =>
      `<div class="lb-name">${f.name}</div>`
    ).join("");

    const countEl = document.createElement("div");
    countEl.className = "lb-count";
    countEl.textContent = tier[0].count + (tier[0].count === 1 ? " node" : " nodes");

    row.appendChild(rankEl);
    row.appendChild(iconsEl);
    row.appendChild(namesEl);
    row.appendChild(countEl);
    container.appendChild(row);
  });
}

/* ── BUILD TERRITORY SVG ── */
const svg = document.getElementById("territory-svg");

territories.forEach(t => {
  const g = document.createElementNS("http://www.w3.org/2000/svg","g");
  g.setAttribute("class","territory-group");

  const poly = document.createElementNS("http://www.w3.org/2000/svg", t.path ? "path" : "polygon");
  if(t.path){ poly.setAttribute("d", t.path); }
  else { poly.setAttribute("points", t.points.map(p=>p.join(",")).join(" ")); }
  poly.setAttribute("class","territory-poly");
  poly.style.fill = hexToRGBA(t.color, 0.19);

  // Pink outer outline — same path, wider stroke, rendered behind the silver border
  const outline = document.createElementNS("http://www.w3.org/2000/svg", t.path ? "path" : "polygon");
  if(t.path){ outline.setAttribute("d", t.path); }
  else { outline.setAttribute("points", t.points.map(p=>p.join(",")).join(" ")); }
  outline.setAttribute("class","territory-poly-outline");

  const iconSize = 1.6;
  const label = document.createElementNS("http://www.w3.org/2000/svg","text");
  label.setAttribute("class","node-label");
  label.textContent = String(t.id).padStart(2,"0");

  const icon = document.createElementNS("http://www.w3.org/2000/svg","image");
  icon.setAttribute("href", t.icon);
  icon.setAttribute("width", iconSize);
  icon.setAttribute("height", iconSize);
  icon.setAttribute("class","territory-icon");

  g.appendChild(outline);
  g.appendChild(poly);
  g.appendChild(label);
  g.appendChild(icon);
  svg.appendChild(g);

  requestAnimationFrame(() => {
    const bb = poly.getBBox();
    const cx = bb.x + bb.width  / 2;
    const cy = bb.y + bb.height / 2;
    label.setAttribute("x", cx);
    label.setAttribute("y", cy);
    icon.setAttribute("x", cx - iconSize/2);
    icon.setAttribute("y", cy - iconSize/2);
  });

  function openModal(){
    document.getElementById("modal-title").textContent      = t.name || "Territory "+t.id;
    document.getElementById("modal-subtitle").textContent   = t.subtitle || "";
    document.getElementById("modal-icon").src               = t.icon;
    document.getElementById("modal-controller").textContent = t.controller || "Unknown";
    document.getElementById("modal-size").textContent       = t.size || "Unknown";
    document.getElementById("modal-value").textContent      = t.value || "—";
    document.getElementById("modal-desc").textContent       = t.desc || "";
    const statusEl = document.getElementById("modal-status");
    statusEl.innerHTML = `<span class="modal-status-badge badge-${t.status||'neutral'}">${t.statusLabel||"Unknown"}</span>`;
    overlay.classList.add("open");
  }

  g.addEventListener("click", () => { if(!didPan) openModal(); });

  g.addEventListener("touchend", e => {
    if(wasTap){
      e.preventDefault();
      e.stopPropagation();
      openModal();
    }
  },{passive:false});
});

});

/* ── TOGGLE BORDERS ONLY ── */
let bordersOnly = false;
const toggleBtn = document.getElementById("toggle-nodes-btn");

function doToggle(){
  bordersOnly = !bordersOnly;
  toggleBtn.querySelector(".menu-icon").textContent = "🗺️";
  toggleBtn.childNodes[toggleBtn.childNodes.length-1].textContent = bordersOnly ? " Show All" : " Borders Only";
  svg.classList.toggle("borders-only", bordersOnly);
  document.querySelectorAll(".territory-poly").forEach(p => {
    if(bordersOnly){ p.dataset.prevFill=p.style.fill; p.style.fill="none"; p.style.stroke="silver"; }
    else { p.style.fill = p.dataset.prevFill || ""; }
  });
  document.querySelectorAll(".node-label").forEach(el => el.style.display = bordersOnly?"none":"");
  document.querySelectorAll(".territory-icon").forEach(el => el.style.display = bordersOnly?"none":"");
  closeMenu();
}

toggleBtn.addEventListener("click", e => { e.stopPropagation(); doToggle(); });
toggleBtn.addEventListener("touchstart", e => { e.stopPropagation(); e.preventDefault(); doToggle(); },{passive:false});
