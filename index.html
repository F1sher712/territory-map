<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Territory Map</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:black;
  overflow:hidden;
  font-family:"Times New Roman", serif;
  color:white;
}

/* TOP BAR */
#top-bar{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#121212;
  border:1px solid white;
  padding:14px 30px;
  border-radius:16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  z-index:999;
}

#top-title{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:20px;
  font-weight:700;
}

#top-title img{height:32px;}

#rules-link{
  font-size:14px;
  color:rgb(71, 166, 221);
  text-decoration:none;
}

#rules-link span{
  color:red;
  margin-left:4px;
}

/* MAP */
#map-container{
  width:100vw;
  height:100vh;
  overflow:hidden;
  cursor:grab;
}
#map-container.grabbing{cursor:grabbing;}

#map-wrapper{
  position:absolute;
  top:0;
  left:0;
  transform-origin:0 0;
}

#bg-logo{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:50%;
  opacity:0.05;
  pointer-events:none;
}

#map-wrapper img.map{
  width:100%;
  display:block;
  pointer-events:none;
}

#territory-svg{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

/* TERRITORY */
.territory-group{cursor:pointer;}

.territory-poly{
  stroke:silver;
  stroke-width:0.5;
  transition:0.2s;
}

/* ✅ FIXED HOVER */
.territory-group:hover .territory-poly{
  fill:rgba(255,182,193,0.4) !important;
}

/* NUMBER BOX */
.number-box{
  fill:#2a2a2a;
  stroke:silver;
  stroke-width:0.08;
}

/* NUMBER TEXT */
.territory-label{
  fill:white;
  font-size:1.3px;
  text-anchor:middle;
  dominant-baseline:middle;
  font-weight:bold;
  pointer-events:none;
}

/* ICON */
.territory-icon{
  pointer-events:none;
}

/* MODAL */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}
.modal-overlay.open{display:flex;}

.modal{
  background:black;
  padding:20px 25px;
  border-radius:8px;
  border:1px solid white;
  position:relative;
  width:auto;
  max-width:90vw;
}

.modal h2{
  margin-bottom:8px;
}

.modal-close{
  position:absolute;
  top:6px;
  right:10px;
  font-size:18px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="top-bar">
  <div id="top-title">
    Node Control Map
    <img src="logo.png">
  </div>

  <a id="rules-link" href="https://docs.google.com/document/d/1uo7Kn0eOoMWLEY8FDHopDWbpXySb-J01I7ewMGmW6XQ/edit?tab=t.0" target="_blank">
    Warfare Rules <span>!</span>
  </a>
</div>

<div id="map-container">
  <div id="map-wrapper">
    <img src="logo.png" id="bg-logo">
    <img src="map.png" class="map" id="map-img">
    <svg id="territory-svg" viewBox="0 0 100 100"></svg>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-close" id="modal-close">&times;</div>
    <h2 id="modal-title"></h2>
    <div id="modal-size"></div>
    <div id="modal-extra"></div>
  </div>
</div>

<script>
let scale, minScale;
let originX, originY;

const container=document.getElementById("map-container");
const wrapper=document.getElementById("map-wrapper");
const mapImg=document.getElementById("map-img");

function hexToRGBA(hex, alpha){
  const r=parseInt(hex.substring(1,3),16);
  const g=parseInt(hex.substring(3,5),16);
  const b=parseInt(hex.substring(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function init(){
  const cW=container.clientWidth;
  const cH=container.clientHeight;
  const mW=mapImg.naturalWidth;
  const mH=mapImg.naturalHeight;

  minScale=Math.min(cW/mW,cH/mH);
  scale=minScale;

  originX=(cW - mW*scale)/2;
  originY=(cH - mH*scale)/2;

  apply();
}
mapImg.onload=init;
window.addEventListener("resize",init);

function apply(){
  wrapper.style.transform=`translate(${originX}px,${originY}px) scale(${scale})`;
}

function clamp(){
  const rect=wrapper.getBoundingClientRect();
  const cRect=container.getBoundingClientRect();

  const minX=cRect.width-rect.width;
  const minY=cRect.height-rect.height;

  originX=Math.min(0,Math.max(minX,originX));
  originY=Math.min(0,Math.max(minY,originY));
}

container.addEventListener("wheel",e=>{
  e.preventDefault();

  const rect=wrapper.getBoundingClientRect();
  const mouseX=e.clientX-rect.left;
  const mouseY=e.clientY-rect.top;

  const zoom=e.deltaY<0?1.1:0.9;
  let newScale=scale*zoom;

  if(newScale<minScale) newScale=minScale;

  const ratio=newScale/scale;

  originX=e.clientX - mouseX*ratio;
  originY=e.clientY - mouseY*ratio;

  scale=newScale;

  clamp();
  apply();
});

/* PAN */
let dragging=false,lastX=0,lastY=0;

container.addEventListener("mousedown",e=>{
  dragging=true;
  lastX=e.clientX;
  lastY=e.clientY;
  container.classList.add("grabbing");
});

window.addEventListener("mouseup",()=>{
  dragging=false;
  container.classList.remove("grabbing");
});

window.addEventListener("mousemove",e=>{
  if(!dragging)return;

  const dx=e.clientX-lastX;
  const dy=e.clientY-lastY;

  originX+=dx;
  originY+=dy;

  lastX=e.clientX;
  lastY=e.clientY;

  clamp();
  apply();
});

/* TERRITORIES */
const territories=[
  {id:1,color:"#f7ebeb",icon:"mono.png",points:[[25,32],[36,30],[42,36],[40,46],[34,50],[24,46]]},
  {id:2,color:"#1da842",icon:"Freedom.png",points:[[50,30],[60,28],[65,35],[62,42],[55,45],[48,38]]},
  {id:3,color:"#bd983c",icon:"Loner Logo without background.png",points:[[30,60],[40,58],[45,65],[42,72],[35,75],[28,68]]},
  {id:4,color:"#750808",icon:"Duty.png",points:[[60,60],[70,58],[75,65],[72,72],[65,75],[58,68]]}
];

const svg=document.getElementById("territory-svg");
const overlay=document.getElementById("modal-overlay");

territories.forEach(t=>{
  const g=document.createElementNS("http://www.w3.org/2000/svg","g");
  g.setAttribute("class","territory-group");

  const poly=document.createElementNS("http://www.w3.org/2000/svg","polygon");
  poly.setAttribute("points",t.points.map(p=>p.join(",")).join(" "));
  poly.setAttribute("class","territory-poly");
  poly.style.fill = hexToRGBA(t.color, 0.15);

  const cx=t.points.reduce((s,p)=>s+p[0],0)/t.points.length;
  const cy=t.points.reduce((s,p)=>s+p[1],0)/t.points.length;

  const iconSize=4.6;

  const icon=document.createElementNS("http://www.w3.org/2000/svg","image");
  icon.setAttribute("href",t.icon);
  icon.setAttribute("x",cx - iconSize/2);
  icon.setAttribute("y",cy - iconSize/2);
  icon.setAttribute("width",iconSize);
  icon.setAttribute("height",iconSize);

  const box=document.createElementNS("http://www.w3.org/2000/svg","rect");
  box.setAttribute("x",cx-1.3);
  box.setAttribute("y",cy + iconSize/2 - 0.15);
  box.setAttribute("width",2.6);
  box.setAttribute("height",1.1);
  box.setAttribute("rx",0.3);
  box.setAttribute("class","number-box");

  const label=document.createElementNS("http://www.w3.org/2000/svg","text");
  label.setAttribute("x",cx);
  label.setAttribute("y",cy + iconSize/2 + 0.35);
  label.setAttribute("class","territory-label");
  label.textContent=t.id;

  g.appendChild(poly);
  g.appendChild(icon);
  g.appendChild(box);
  g.appendChild(label);
  svg.appendChild(g);

  g.addEventListener("click",()=>{
    document.getElementById("modal-title").textContent="Territory "+t.id;
    document.getElementById("modal-size").textContent="Size: Unknown";
    document.getElementById("modal-extra").textContent="Status: Unknown";
    overlay.classList.add("open");
  });
});

document.getElementById("modal-close").onclick=()=>overlay.classList.remove("open");
overlay.onclick=e=>{
  if(e.target===overlay) overlay.classList.remove("open");
};
</script>

</body>
</html>
