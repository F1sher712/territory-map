<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Territory Map</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:black;
  overflow:hidden;
  font-family:"Times New Roman", serif;
  color:white;
}

/* TOP BAR */
#top-bar{
  position:fixed;
  top:12px;
  left:50%;
  transform:translateX(-50%);
  background:#121212;
  border:1px solid white;
  padding:10px 20px;
  border-radius:16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  z-index:999;
  max-width:calc(100vw - 130px);
  white-space:nowrap;
}

#top-title{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:clamp(13px, 3.5vw, 20px);
  font-weight:700;
}

#top-title img{height:clamp(20px, 4vw, 32px);}

#rules-link{
  font-size:clamp(10px, 2.5vw, 14px);
  color:rgb(71, 166, 221);
  text-decoration:none;
}

#rules-link span{
  color:red;
  margin-left:4px;
}

/* BORDERS BUTTON — top right (desktop), bottom right (mobile) */
#toggle-nodes-btn{
  position:fixed;
  top:12px;
  right:12px;
  z-index:999;
  background:#121212;
  border:1px solid white;
  color:#e0e0e0;
  font-family:"Times New Roman",serif;
  font-size:clamp(10px, 2.5vw, 12px);
  padding:6px 12px;
  border-radius:8px;
  cursor:pointer;
  transition:background 0.2s, border-color 0.2s, color 0.2s, box-shadow 0.2s;
  letter-spacing:0.5px;
  box-shadow:0 0 6px rgba(255,255,255,0.15);
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
#toggle-nodes-btn:hover{
  background:rgba(255,255,255,0.1);
  border-color:white;
  box-shadow:0 0 10px rgba(255,255,255,0.35);
}
#toggle-nodes-btn.borders-only{
  color:#aad4ff;
  border-color:rgba(100,180,255,0.6);
  box-shadow:0 0 8px rgba(100,180,255,0.4);
}

/* MAP */
#map-container{
  width:100vw;
  height:100vh;
  overflow:hidden;
  cursor:grab;
  user-select:none;
  -webkit-user-select:none;
  touch-action:none;
}
#map-container.grabbing{cursor:grabbing;}

#map-wrapper{
  position:absolute;
  top:0;
  left:0;
  transform-origin:0 0;
}

#bg-logo{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:50%;
  opacity:0.05;
  pointer-events:none;
}

#map-wrapper img.map{
  width:100%;
  display:block;
  pointer-events:none;
}

#territory-svg{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

/* TERRITORY */
.territory-group{cursor:pointer;}

.territory-poly{
  stroke:silver;
  stroke-width:0.15;
  transition:0.2s;
}

/* ✅ FIXED HOVER */
.territory-group:hover .territory-poly{
  fill:rgba(255,182,193,0.4) !important;
}

/* Borders-only mode: suppress hover fill */
#territory-svg.borders-only .territory-group:hover .territory-poly{
  fill:none !important;
}

/* NUMBER BOX */
.number-box{
  fill:#2a2a2a;
  stroke:silver;
  stroke-width:0.08;
}

/* NUMBER TEXT */
.territory-label{
  fill:white;
  font-size:1.3px;
  text-anchor:middle;
  dominant-baseline:middle;
  font-weight:bold;
  pointer-events:none;
}

/* NODE NUMBER BUBBLE — visible by default, hidden on hover */
.node-bubble{
  transition:opacity 0.2s;
}
.territory-group:hover .node-bubble{
  opacity:0;
}

/* NODE NUMBER TEXT */
.node-label{
  fill:white;
  font-size:0.7px;
  text-anchor:middle;
  dominant-baseline:middle;
  font-weight:bold;
  pointer-events:none;
  transition:opacity 0.2s;
}
.territory-group:hover .node-label{
  opacity:0;
}

/* ICON — hidden by default, shown on hover */
.territory-icon{
  pointer-events:none;
  opacity:0;
  transition:opacity 0.2s;
}

.territory-group:hover .territory-icon{
  opacity:1;
}

/* MODAL */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(3px);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:1000;
}
.modal-overlay.open{display:flex;}

@keyframes slideUp{
  from{opacity:0;transform:translateY(24px) scale(0.97);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

.modal{
  position:relative;
  width:560px;
  max-width:96vw;
  max-height:90vh;
  overflow-y:auto;
  background:#121212;
  border-radius:4px;
  box-shadow:0 20px 60px rgba(0,0,0,0.85), 0 0 0 1px rgba(255,255,255,0.06);
  animation:slideUp 0.25s ease;
  font-family:"Times New Roman",serif;
}

/* faction color accent bar at top */
.modal-accent-bar{
  height:4px;
  width:100%;
  background:var(--faction-color, #555);
  box-shadow:0 0 18px var(--faction-color, #555);
}

/* scanline overlay */
.modal::after{
  content:"";
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.07) 3px,
    rgba(0,0,0,0.07) 4px
  );
  pointer-events:none;
  z-index:0;
}

.modal-inner{
  position:relative;
  z-index:1;
  padding:clamp(14px,4vw,22px) clamp(14px,4vw,26px) clamp(16px,4vw,26px);
}

/* HEADER */
.modal-header{
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:18px;
}

.modal-icon-wrap{
  flex-shrink:0;
  width:clamp(56px,15vw,84px);
  height:clamp(56px,15vw,84px);
  border-radius:6px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:8px;
}

.modal-faction-icon{
  width:100%;
  height:100%;
  object-fit:contain;
}

.modal-header-text{
  flex:1;
  min-width:0;
}

.modal-header-text h2{
  font-size:clamp(13px,4vw,17px);
  font-weight:700;
  letter-spacing:0.6px;
  color:#f0f0f0;
  margin:0 0 4px 0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.modal-subtitle{
  font-size:11px;
  color:#555;
  letter-spacing:1.5px;
  text-transform:uppercase;
}

/* DIVIDER */
.modal-divider{
  height:1px;
  background:linear-gradient(to right, var(--faction-color,#444), transparent);
  margin-bottom:16px;
  opacity:0.5;
}

/* STATS GRID */
.modal-stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:16px;
}

.modal-stat{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:3px;
  padding:8px 12px;
}

.modal-stat .stat-label{
  font-size:10px;
  color:#555;
  text-transform:uppercase;
  letter-spacing:1.2px;
  margin-bottom:4px;
}

.modal-stat .stat-value{
  font-size:14px;
  font-weight:700;
  color:#ddd;
  letter-spacing:0.3px;
}

/* STATUS BADGE */
.modal-status-badge{
  display:inline-flex;
  align-items:center;
  gap:5px;
  font-size:12px;
  font-weight:700;
  letter-spacing:0.5px;
}

.modal-status-badge::before{
  content:"";
  display:inline-block;
  width:7px;
  height:7px;
  border-radius:50%;
  background:currentColor;
  box-shadow:0 0 6px currentColor;
}

.badge-contested{ color:#ff6060; }
.badge-controlled{ color:#50e87a; }
.badge-neutral{ color:#7878ff; }

/* DESCRIPTION */
.modal-desc-wrap{
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(255,255,255,0.06);
  border-left:2px solid var(--faction-color,#444);
  border-radius:0 3px 3px 0;
  padding:10px 14px;
}

.modal-desc{
  font-size:13px;
  color:#999;
  line-height:1.75;
  font-style:italic;
}

/* CLOSE */
.modal-close{
  position:absolute;
  top:12px;
  right:14px;
  font-size:18px;
  cursor:pointer;
  color:#444;
  transition:color 0.2s;
  z-index:2;
  line-height:1;
}
.modal-close:hover{ color:#bbb; }

/* MOBILE OVERRIDES */
@media (max-width: 600px) {
  /* Top bar: compact but readable, won't overlap the button */
  #top-bar{
    padding:10px 16px;
    gap:4px;
    border-radius:12px;
    max-width:calc(100vw - 120px);
  }
  #top-title{
    font-size:15px;
    gap:8px;
  }
  #top-title img{ height:22px; }
  #rules-link{ font-size:12px; }

  /* Borders button: readable but compact enough to not clash */
  #toggle-nodes-btn{
    font-size:12px;
    padding:8px 13px;
    border-radius:9px;
    top:10px;
    right:10px;
  }

  /* Modal: bigger and easier to read */
  .modal-inner{
    padding:20px 18px 24px;
  }
  .modal-header{ gap:12px; margin-bottom:14px; }
  .modal-icon-wrap{ width:64px; height:64px; }
  .modal-header-text h2{ font-size:16px; }
  .modal-subtitle{ font-size:12px; }
  .modal-stat .stat-label{ font-size:11px; }
  .modal-stat .stat-value{ font-size:15px; }
  .modal-status-badge{ font-size:13px; }
  .modal-desc{ font-size:14px; }
  .modal-close{ font-size:24px; top:14px; right:16px; }
}
</style>
</head>

<body>

<div id="top-bar">
  <div id="top-title">
    Node Control Map
    <img src="logo.png">
  </div>

  <a id="rules-link" href="https://docs.google.com/document/d/1uo7Kn0eOoMWLEY8FDHopDWbpXySb-J01I7ewMGmW6XQ/edit?tab=t.0" target="_blank">
    Warfare Rules <span>!</span>
  </a>
</div>

<button id="toggle-nodes-btn">◈ Borders Only</button>

<div id="map-container">
  <div id="map-wrapper">
    <img src="logo.png" id="bg-logo">
    <img src="map.png" class="map" id="map-img">
    <svg id="territory-svg" viewBox="0 0 100 50"></svg>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-box">
    <div class="modal-accent-bar" id="modal-accent-bar"></div>
    <div class="modal-inner">
      <div class="modal-close" id="modal-close">&times;</div>
      <div class="modal-header">
        <div class="modal-icon-wrap">
          <img class="modal-faction-icon" id="modal-icon" src="" alt="faction icon">
        </div>
        <div class="modal-header-text">
          <h2 id="modal-title"></h2>
          <div class="modal-subtitle" id="modal-subtitle"></div>
        </div>
      </div>
      <div class="modal-divider" id="modal-divider"></div>
      <div class="modal-stats">
        <div class="modal-stat">
          <div class="stat-label">Controller</div>
          <div class="stat-value" id="modal-controller"></div>
        </div>
        <div class="modal-stat">
          <div class="stat-label">Status</div>
          <div class="stat-value" id="modal-status"></div>
        </div>
        <div class="modal-stat">
          <div class="stat-label">Territory Size</div>
          <div class="stat-value" id="modal-size"></div>
        </div>
        <div class="modal-stat">
          <div class="stat-label">Strategic Value</div>
          <div class="stat-value" id="modal-value"></div>
        </div>
      </div>
      <div class="modal-desc-wrap" id="modal-desc-wrap">
        <div class="modal-desc" id="modal-desc"></div>
      </div>
    </div>
  </div>
</div>

<script>
let scale, minScale;
let originX, originY;

const container=document.getElementById("map-container");
const wrapper=document.getElementById("map-wrapper");
const mapImg=document.getElementById("map-img");

function hexToRGBA(hex, alpha){
  const r=parseInt(hex.substring(1,3),16);
  const g=parseInt(hex.substring(3,5),16);
  const b=parseInt(hex.substring(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function init(){
  const cW=container.clientWidth;
  const cH=container.clientHeight;
  const mW=mapImg.naturalWidth;
  const mH=mapImg.naturalHeight;

  if(!mW || !mH) return;

  wrapper.style.width=mW+"px";
  wrapper.style.height=mH+"px";

  const fitScale=Math.min(cW/mW,cH/mH);
  const isMobile=window.innerWidth<=600;
  // On mobile: floor is whichever is larger — fit-to-screen or fill-width at 90%
  // This prevents zooming out to a tiny postage-stamp map on phones
  minScale = isMobile ? Math.max(fitScale, cW / mW * 0.9) : fitScale;
  scale=minScale*1;

  originX=(cW - mW*scale)/2;
  originY=(cH - mH*scale)/2;

  apply();
}
if(mapImg.complete && mapImg.naturalWidth>0){
  init();
} else {
  mapImg.onload=init;
}
window.addEventListener("resize",init);

function apply(){
  wrapper.style.transform=`translate(${originX}px,${originY}px) scale(${scale})`;
}

function clamp(){
  const cW=container.clientWidth;
  const cH=container.clientHeight;
  const mW=mapImg.naturalWidth;
  const mH=mapImg.naturalHeight;

  const scaledW=mW*scale;
  const scaledH=mH*scale;

  if(scaledW<=cW){
    originX=(cW-scaledW)/2;
  } else {
    originX=Math.min(0,Math.max(cW-scaledW,originX));
  }

  if(scaledH<=cH){
    originY=(cH-scaledH)/2;
  } else {
    originY=Math.min(0,Math.max(cH-scaledH,originY));
  }
}

container.addEventListener("wheel",e=>{
  e.stopPropagation();
  e.preventDefault();

  const rect=wrapper.getBoundingClientRect();
  const mouseX=e.clientX-rect.left;
  const mouseY=e.clientY-rect.top;

  const zoom=e.deltaY<0?1.1:0.9;
  let newScale=scale*zoom;

  if(newScale<minScale) newScale=minScale;

  const ratio=newScale/scale;

  originX=e.clientX - mouseX*ratio;
  originY=e.clientY - mouseY*ratio;

  scale=newScale;

  clamp();
  apply();
});

/* PAN */
let dragging=false,lastX=0,lastY=0;
let dragStartX=0,dragStartY=0,didPan=false;
const PAN_THRESHOLD=2; // pixels of movement before it counts as a pan

container.addEventListener("mousedown",e=>{
  dragging=true;
  didPan=false;
  lastX=e.clientX;
  lastY=e.clientY;
  dragStartX=e.clientX;
  dragStartY=e.clientY;
  container.classList.add("grabbing");
});

window.addEventListener("mouseup",()=>{
  dragging=false;
  container.classList.remove("grabbing");
});

window.addEventListener("mousemove",e=>{
  if(!dragging)return;

  const dx=e.clientX-lastX;
  const dy=e.clientY-lastY;

  originX+=dx;
  originY+=dy;

  lastX=e.clientX;
  lastY=e.clientY;

  const totalDx=e.clientX-dragStartX;
  const totalDy=e.clientY-dragStartY;
  if(Math.abs(totalDx)>PAN_THRESHOLD || Math.abs(totalDy)>PAN_THRESHOLD){
    didPan=true;
  }

  clamp();
  apply();
});

/* TAP DETECTION — track per-touch whether it was a pan */
let tapStartX=0, tapStartY=0, wasTap=false;
const TAP_THRESHOLD=8;

/* TERRITORIES */
const territories=[
  {

  },
  {

    path:"m 6.6506134,20.99954 c 0,0 0.8199387,-0.318865 1.3665644,0.04555 0,0 0.5466259,0.819941 1.6854296,0.911045 0,0 -1.0021473,2.095399 -0.2733129,3.325307 0,0 0.318865,-2.004295 -9.4292945,-0.865491 l 0.09110429,-3.18865 c 0,0 1.09325151,0.04555 1.27546011,-0.364418 l 0.068328,0.239149 1.1274157,-0.05694 0.05694,-0.239149 c 0,0 1.8220856,0.728835 4.0313649,0.193597 z",
    name:"Territory Name",
    subtitle:"Sector — Node 08",
    controller:"Loners",

    value:"⭐⭐⭐",
    desc:"Description of this territory."
  }
];

const svg=document.getElementById("territory-svg");
const overlay=document.getElementById("modal-overlay");

territories.forEach(t=>{
  const g=document.createElementNS("http://www.w3.org/2000/svg","g");
  g.setAttribute("class","territory-group");

  const poly=document.createElementNS("http://www.w3.org/2000/svg", t.path ? "path" : "polygon");
  if(t.path){
    poly.setAttribute("d", t.path);
  } else {
    poly.setAttribute("points",t.points.map(p=>p.join(",")).join(" "));
  }
  poly.setAttribute("class","territory-poly");
  poly.style.fill = hexToRGBA(t.color, 0.19);

  const iconSize=1.6;

  const label=document.createElementNS("http://www.w3.org/2000/svg","text");
  label.setAttribute("class","node-label");
  label.textContent = String(t.id).padStart(2,"0");

  const icon=document.createElementNS("http://www.w3.org/2000/svg","image");
  icon.setAttribute("href",t.icon);
  icon.setAttribute("width",iconSize);
  icon.setAttribute("height",iconSize);
  icon.setAttribute("class","territory-icon");

  g.appendChild(poly);
  g.appendChild(label);
  g.appendChild(icon);
  svg.appendChild(g);

  // After appended to DOM, use getBBox for true visual center
  requestAnimationFrame(()=>{
    const bb = poly.getBBox();
    const cx = bb.x + bb.width / 2;
    const cy = bb.y + bb.height / 2;
    label.setAttribute("x", cx);
    label.setAttribute("y", cy);
    icon.setAttribute("x", cx - iconSize/2);
    icon.setAttribute("y", cy - iconSize/2);
  });

  function openModal(){
    document.getElementById("modal-title").textContent=t.name||"Territory "+t.id;
    document.getElementById("modal-subtitle").textContent=t.subtitle||"";
    document.getElementById("modal-icon").src=t.icon;
    document.getElementById("modal-controller").textContent=t.controller||"Unknown";
    document.getElementById("modal-size").textContent=t.size||"Unknown";
    document.getElementById("modal-value").textContent=t.value||"—";
    document.getElementById("modal-desc").textContent=t.desc||"";
    const statusEl=document.getElementById("modal-status");
    statusEl.innerHTML=`<span class="modal-status-badge badge-${t.status||'neutral'}">${t.statusLabel||"Unknown"}</span>`;
    overlay.classList.add("open");
  }

  g.addEventListener("click",()=>{
    if(didPan) return;
    openModal();
  });

  // Mobile tap: fire on touchend only if finger barely moved
  g.addEventListener("touchend",e=>{
    if(wasTap){
      e.preventDefault();
      e.stopPropagation();
      openModal();
    }
  },{passive:false});
});

/* TOUCH PAN & PINCH-TO-ZOOM */
let lastTouchDist=0;

container.addEventListener("touchstart",e=>{
  e.preventDefault();
  if(e.touches.length===1){
    dragging=true;
    wasTap=true;
    lastX=e.touches[0].clientX;
    lastY=e.touches[0].clientY;
    tapStartX=lastX;
    tapStartY=lastY;
  } else if(e.touches.length===2){
    dragging=false;
    wasTap=false;
    lastTouchDist=Math.hypot(
      e.touches[0].clientX-e.touches[1].clientX,
      e.touches[0].clientY-e.touches[1].clientY
    );
  }
},{passive:false});

container.addEventListener("touchmove",e=>{
  e.preventDefault();
  if(e.touches.length===1 && dragging){
    const dx=e.touches[0].clientX-lastX;
    const dy=e.touches[0].clientY-lastY;
    originX+=dx;
    originY+=dy;
    lastX=e.touches[0].clientX;
    lastY=e.touches[0].clientY;
    const tdx=e.touches[0].clientX-tapStartX;
    const tdy=e.touches[0].clientY-tapStartY;
    if(Math.abs(tdx)>TAP_THRESHOLD||Math.abs(tdy)>TAP_THRESHOLD){
      wasTap=false;
    }
    clamp();
    apply();
  } else if(e.touches.length===2){
    const dist=Math.hypot(
      e.touches[0].clientX-e.touches[1].clientX,
      e.touches[0].clientY-e.touches[1].clientY
    );
    if(!lastTouchDist){ lastTouchDist=dist; return; }
    const midX=(e.touches[0].clientX+e.touches[1].clientX)/2;
    const midY=(e.touches[0].clientY+e.touches[1].clientY)/2;
    const rect=wrapper.getBoundingClientRect();
    const mX=midX-rect.left;
    const mY=midY-rect.top;
    const zoom=dist/lastTouchDist;
    let newScale=scale*zoom;
    if(newScale<minScale) newScale=minScale;
    const ratio=newScale/scale;
    originX=midX-mX*ratio;
    originY=midY-mY*ratio;
    scale=newScale;
    lastTouchDist=dist;
    clamp();
    apply();
  }
},{passive:false});

container.addEventListener("touchend",e=>{
  if(e.touches.length===0){
    dragging=false;
    lastTouchDist=0;
    // wasTap stays true here — territory touchend fires first and reads it, then we reset
    setTimeout(()=>{ wasTap=false; },100);
  }
},{passive:true});

/* TOGGLE BORDERS ONLY */
let bordersOnly=false;
const toggleBtn=document.getElementById("toggle-nodes-btn");

// On mobile, touchstart on the button fires before the container's touchstart
// because the button is NOT inside the container — so stopPropagation works fine.
// We handle the full toggle on touchstart to be as responsive as possible.
toggleBtn.addEventListener("touchstart",e=>{
  e.stopPropagation();
  e.preventDefault();
  doToggle();
},{passive:false});

function doToggle(){
  bordersOnly=!bordersOnly;
  toggleBtn.textContent=bordersOnly?"◈ Show All":"◈ Borders Only";
  toggleBtn.classList.toggle("borders-only",bordersOnly);
  svg.classList.toggle("borders-only",bordersOnly);

  document.querySelectorAll(".territory-poly").forEach(p=>{
    if(bordersOnly){
      p.dataset.prevFill=p.style.fill;
      p.style.fill="none";
      p.style.stroke="silver";
    } else {
      p.style.fill=p.dataset.prevFill||"";
    }
  });
  document.querySelectorAll(".node-label").forEach(el=>{
    el.style.display=bordersOnly?"none":"";
  });
  document.querySelectorAll(".territory-icon").forEach(el=>{
    el.style.display=bordersOnly?"none":"";
  });
}

// Desktop click
toggleBtn.addEventListener("click", doToggle);

document.getElementById("modal-close").onclick=()=>overlay.classList.remove("open");
overlay.onclick=e=>{
  if(e.target===overlay) overlay.classList.remove("open");
};
</script>
