<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Territory Map</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:black;
  overflow:hidden;
  font-family:"Times New Roman", serif;
  color:white;
}

/* TOP BAR */
#top-bar{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#121212;
  border:1px solid white;
  padding:14px 30px;
  border-radius:16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  z-index:999;
}

#top-title{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:20px;
  font-weight:700;
}

#top-title img{height:32px;}

#rules-link{
  font-size:14px;
  color:rgb(71, 166, 221);
  text-decoration:none;
}

#rules-link span{
  color:red;
  margin-left:4px;
}

/* MAP */
#map-container{
  width:100vw;
  height:100vh;
  overflow:hidden;
  cursor:grab;
}
#map-container.grabbing{cursor:grabbing;}

#map-wrapper{
  position:absolute;
  top:0;
  left:0;
  transform-origin:0 0;
}

#bg-logo{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:50%;
  opacity:0.05;
  pointer-events:none;
}

#map-wrapper img.map{
  width:100%;
  display:block;
  pointer-events:none;
}

#territory-svg{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

/* TERRITORY */
.territory-group{cursor:pointer;}

.territory-poly{
  stroke:silver;
  stroke-width:0.5;
  transition:0.2s;
}

/* ✅ FIXED HOVER */
.territory-group:hover .territory-poly{
  fill:rgba(255,182,193,0.4) !important;
}

/* NUMBER BOX */
.number-box{
  fill:#2a2a2a;
  stroke:silver;
  stroke-width:0.08;
}

/* NUMBER TEXT */
.territory-label{
  fill:white;
  font-size:1.3px;
  text-anchor:middle;
  dominant-baseline:middle;
  font-weight:bold;
  pointer-events:none;
}

/* ICON — hidden by default, shown on hover */
.territory-icon{
  pointer-events:none;
  opacity:0;
  transition:opacity 0.2s;
}

.territory-group:hover .territory-icon{
  opacity:1;
}

/* MODAL */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(3px);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:1000;
}
.modal-overlay.open{display:flex;}

@keyframes slideUp{
  from{opacity:0;transform:translateY(24px) scale(0.97);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

.modal{
  position:relative;
  width:560px;
  max-width:93vw;
  background:#121212;
  border-radius:4px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.85), 0 0 0 1px rgba(255,255,255,0.06);
  animation:slideUp 0.25s ease;
  font-family:"Times New Roman",serif;
}

/* faction color accent bar at top */
.modal-accent-bar{
  height:4px;
  width:100%;
  background:var(--faction-color, #555);
  box-shadow:0 0 18px var(--faction-color, #555);
}

/* scanline overlay */
.modal::after{
  content:"";
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.07) 3px,
    rgba(0,0,0,0.07) 4px
  );
  pointer-events:none;
  z-index:0;
}

.modal-inner{
  position:relative;
  z-index:1;
  padding:22px 26px 26px;
}

/* HEADER */
.modal-header{
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:18px;
}

.modal-icon-wrap{
  flex-shrink:0;
  width:84px;
  height:84px;
  border-radius:6px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:8px;
}

.modal-faction-icon{
  width:100%;
  height:100%;
  object-fit:contain;
}

.modal-header-text{
  flex:1;
  min-width:0;
}

.modal-header-text h2{
  font-size:17px;
  font-weight:700;
  letter-spacing:0.6px;
  color:#f0f0f0;
  margin:0 0 4px 0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.modal-subtitle{
  font-size:11px;
  color:#555;
  letter-spacing:1.5px;
  text-transform:uppercase;
}

/* DIVIDER */
.modal-divider{
  height:1px;
  background:linear-gradient(to right, var(--faction-color,#444), transparent);
  margin-bottom:16px;
  opacity:0.5;
}

/* STATS GRID */
.modal-stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:16px;
}

.modal-stat{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:3px;
  padding:8px 12px;
}

.modal-stat .stat-label{
  font-size:10px;
  color:#555;
  text-transform:uppercase;
  letter-spacing:1.2px;
  margin-bottom:4px;
}

.modal-stat .stat-value{
  font-size:14px;
  font-weight:700;
  color:#ddd;
  letter-spacing:0.3px;
}

/* STATUS BADGE */
.modal-status-badge{
  display:inline-flex;
  align-items:center;
  gap:5px;
  font-size:12px;
  font-weight:700;
  letter-spacing:0.5px;
}

.modal-status-badge::before{
  content:"";
  display:inline-block;
  width:7px;
  height:7px;
  border-radius:50%;
  background:currentColor;
  box-shadow:0 0 6px currentColor;
}

.badge-contested{ color:#ff6060; }
.badge-controlled{ color:#50e87a; }
.badge-neutral{ color:#7878ff; }

/* DESCRIPTION */
.modal-desc-wrap{
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(255,255,255,0.06);
  border-left:2px solid var(--faction-color,#444);
  border-radius:0 3px 3px 0;
  padding:10px 14px;
}

.modal-desc{
  font-size:13px;
  color:#999;
  line-height:1.75;
  font-style:italic;
}

/* CLOSE */
.modal-close{
  position:absolute;
  top:12px;
  right:14px;
  font-size:18px;
  cursor:pointer;
  color:#444;
  transition:color 0.2s;
  z-index:2;
  line-height:1;
}
.modal-close:hover{ color:#bbb; }
</style>
</head>

<body>

<div id="top-bar">
  <div id="top-title">
    Node Control Map
    <img src="logo.png">
  </div>

  <a id="rules-link" href="https://docs.google.com/document/d/1uo7Kn0eOoMWLEY8FDHopDWbpXySb-J01I7ewMGmW6XQ/edit?tab=t.0" target="_blank">
    Warfare Rules <span>!</span>
  </a>
</div>

<div id="map-container">
  <div id="map-wrapper">
    <img src="logo.png" id="bg-logo">
    <img src="map.png" class="map" id="map-img">
    <svg id="territory-svg" viewBox="0 0 100 100"></svg>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-box">
    <div class="modal-accent-bar" id="modal-accent-bar"></div>
    <div class="modal-inner">
      <div class="modal-close" id="modal-close">&times;</div>
      <div class="modal-header">
        <div class="modal-icon-wrap">
          <img class="modal-faction-icon" id="modal-icon" src="" alt="faction icon">
        </div>
        <div class="modal-header-text">
          <h2 id="modal-title"></h2>
          <div class="modal-subtitle" id="modal-subtitle"></div>
        </div>
      </div>
      <div class="modal-divider" id="modal-divider"></div>
      <div class="modal-stats">
        <div class="modal-stat">
          <div class="stat-label">Controller</div>
          <div class="stat-value" id="modal-controller"></div>
        </div>
        <div class="modal-stat">
          <div class="stat-label">Status</div>
          <div class="stat-value" id="modal-status"></div>
        </div>
        <div class="modal-stat">
          <div class="stat-label">Territory Size</div>
          <div class="stat-value" id="modal-size"></div>
        </div>
        <div class="modal-stat">
          <div class="stat-label">Strategic Value</div>
          <div class="stat-value" id="modal-value"></div>
        </div>
      </div>
      <div class="modal-desc-wrap" id="modal-desc-wrap">
        <div class="modal-desc" id="modal-desc"></div>
      </div>
    </div>
  </div>
</div>

<script>
let scale, minScale;
let originX, originY;

const container=document.getElementById("map-container");
const wrapper=document.getElementById("map-wrapper");
const mapImg=document.getElementById("map-img");

function hexToRGBA(hex, alpha){
  const r=parseInt(hex.substring(1,3),16);
  const g=parseInt(hex.substring(3,5),16);
  const b=parseInt(hex.substring(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function init(){
  const cW=container.clientWidth;
  const cH=container.clientHeight;
  const mW=mapImg.naturalWidth;
  const mH=mapImg.naturalHeight;

  if(!mW || !mH) return;

  wrapper.style.width=mW+"px";
  wrapper.style.height=mH+"px";

  minScale=Math.min(cW/mW,cH/mH);
  scale=minScale*1.5;

  originX=(cW - mW*scale)/2;
  originY=(cH - mH*scale)/2;

  apply();
}
if(mapImg.complete && mapImg.naturalWidth>0){
  init();
} else {
  mapImg.onload=init;
}
window.addEventListener("resize",init);

function apply(){
  wrapper.style.transform=`translate(${originX}px,${originY}px) scale(${scale})`;
}

function clamp(){
  const cW=container.clientWidth;
  const cH=container.clientHeight;
  const mW=mapImg.naturalWidth;
  const mH=mapImg.naturalHeight;

  const scaledW=mW*scale;
  const scaledH=mH*scale;

  if(scaledW<=cW){
    originX=(cW-scaledW)/2;
  } else {
    originX=Math.min(0,Math.max(cW-scaledW,originX));
  }

  if(scaledH<=cH){
    originY=(cH-scaledH)/2;
  } else {
    originY=Math.min(0,Math.max(cH-scaledH,originY));
  }
}

container.addEventListener("wheel",e=>{
  e.preventDefault();

  const rect=wrapper.getBoundingClientRect();
  const mouseX=e.clientX-rect.left;
  const mouseY=e.clientY-rect.top;

  const zoom=e.deltaY<0?1.1:0.9;
  let newScale=scale*zoom;

  if(newScale<minScale) newScale=minScale;

  const ratio=newScale/scale;

  originX=e.clientX - mouseX*ratio;
  originY=e.clientY - mouseY*ratio;

  scale=newScale;

  clamp();
  apply();
});

/* PAN */
let dragging=false,lastX=0,lastY=0;

container.addEventListener("mousedown",e=>{
  dragging=true;
  lastX=e.clientX;
  lastY=e.clientY;
  container.classList.add("grabbing");
});

window.addEventListener("mouseup",()=>{
  dragging=false;
  container.classList.remove("grabbing");
});

window.addEventListener("mousemove",e=>{
  if(!dragging)return;

  const dx=e.clientX-lastX;
  const dy=e.clientY-lastY;

  originX+=dx;
  originY+=dy;

  lastX=e.clientX;
  lastY=e.clientY;

  clamp();
  apply();
});

/* TERRITORIES */
const territories=[
  {
    id:1,color:"#f7ebeb",icon:"mono.png",
    points:[[25,32],[36,30],[42,36],[40,46],[34,50],[24,46]],
    name:"The Monolith Outpost",
    subtitle:"Northern Sector — Node 01",
    controller:"Monolith",
    status:"contested",statusLabel:"Contested",
    size:"Medium",
    value:"⭐⭐⭐⭐",
    desc:"A heavily fortified research installation deep within the northern exclusion zone. Monolith forces have held this node for weeks, using it to conduct anomalous field experiments. Recent Duty incursions have destabilized the perimeter — control is no longer guaranteed."
  },
  {
    id:2,color:"#1da842",icon:"Freedom.png",
    points:[[50,30],[60,28],[65,35],[62,42],[55,45],[48,38]],
    name:"Freedom's Ridge",
    subtitle:"Central Sector — Node 02",
    controller:"Freedom",
    status:"controlled",statusLabel:"Controlled",
    size:"Large",
    value:"⭐⭐⭐",
    desc:"An elevated vantage point overlooking the central plains. Freedom stalkers use this node as a rally point and supply depot. The open terrain makes it easy to defend but difficult to hold under sustained fire."
  },
  {
    id:3,color:"#bd983c",icon:"Loner Logo without background.png",
    points:[[30,60],[40,58],[45,65],[42,72],[35,75],[28,68]],
    name:"The Drifter's Cache",
    subtitle:"Southern Sector — Node 03",
    controller:"Loners",
    status:"neutral",statusLabel:"Neutral",
    size:"Small",
    value:"⭐⭐",
    desc:"An abandoned warehouse repurposed by independent stalkers as a neutral trading post. No faction officially claims it, but its location near two major routes makes it a frequent flashpoint for skirmishes."
  },
  {
    id:4,color:"#750808",icon:"Duty.png",
    points:[[60,60],[70,58],[75,65],[72,72],[65,75],[58,68]],
    name:"Duty Stronghold",
    subtitle:"Eastern Sector — Node 04",
    controller:"Duty",
    status:"controlled",statusLabel:"Controlled",
    size:"Large",
    value:"⭐⭐⭐⭐⭐",
    desc:"The most fortified position on the map. Duty's iron grip on this node gives them control over the eastern supply corridor. Reinforced bunkers and constant patrols make any assault a costly endeavor."
  }
];

const svg=document.getElementById("territory-svg");
const overlay=document.getElementById("modal-overlay");

territories.forEach(t=>{
  const g=document.createElementNS("http://www.w3.org/2000/svg","g");
  g.setAttribute("class","territory-group");

  const poly=document.createElementNS("http://www.w3.org/2000/svg","polygon");
  poly.setAttribute("points",t.points.map(p=>p.join(",")).join(" "));
  poly.setAttribute("class","territory-poly");
  poly.style.fill = hexToRGBA(t.color, 0.19);

  const cx=t.points.reduce((s,p)=>s+p[0],0)/t.points.length;
  const cy=t.points.reduce((s,p)=>s+p[1],0)/t.points.length;

  const iconSize=4.6;

  const icon=document.createElementNS("http://www.w3.org/2000/svg","image");
  icon.setAttribute("href",t.icon);
  icon.setAttribute("x",cx - iconSize/2);
  icon.setAttribute("y",cy - iconSize/2);
  icon.setAttribute("width",iconSize);
  icon.setAttribute("height",iconSize);
  icon.setAttribute("class","territory-icon");

  g.appendChild(poly);
  g.appendChild(icon);
  svg.appendChild(g);

  g.addEventListener("click",()=>{
    document.getElementById("modal-title").textContent=t.name||"Territory "+t.id;
    document.getElementById("modal-subtitle").textContent=t.subtitle||"";
    document.getElementById("modal-icon").src=t.icon;
    document.getElementById("modal-controller").textContent=t.controller||"Unknown";
    document.getElementById("modal-size").textContent=t.size||"Unknown";
    document.getElementById("modal-value").textContent=t.value||"—";
    document.getElementById("modal-desc").textContent=t.desc||"";
    const statusEl=document.getElementById("modal-status");
    statusEl.innerHTML=`<span class="modal-status-badge badge-${t.status||'neutral'}">${t.statusLabel||"Unknown"}</span>`;
    overlay.classList.add("open");
  });
});

document.getElementById("modal-close").onclick=()=>overlay.classList.remove("open");
overlay.onclick=e=>{
  if(e.target===overlay) overlay.classList.remove("open");
};
</script>

</body>
</html>
